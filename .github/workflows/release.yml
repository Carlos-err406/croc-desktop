name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v0.2.0 — must match the version in tauri.conf.json / package.json
  workflow_dispatch: {} # manual runs build only (validate packaging; no publish)

permissions:
  contents: write # create/upload the draft GitHub Release

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds a universal binary (Intel + Apple Silicon in one).
          - os: macos-14
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          # 22.04 for broader glibc compatibility of the AppImage.
          - os: ubuntu-22.04
            rust-targets: ''
            args: ''
          - os: windows-latest
            rust-targets: ''
            args: ''

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Faster linker on Linux (mold becomes the default ld); no-op on mac/windows.
      - name: Set up mold linker (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system deps (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      # Cache the bundled croc download; beforeBuildCommand's fetch-croc.mjs then
      # skips re-downloading when the cache hits.
      - name: Cache croc sidecar
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries
          key: croc-${{ runner.os }}-${{ hashFiles('scripts/fetch-croc.mjs') }}

      # tauri-action runs the frontend build (beforeBuildCommand), compiles the
      # Rust, bundles per-platform installers, and — on a tag push — uploads them
      # to a draft GitHub Release. On manual dispatch (no tag) it just builds.
      - name: Build (+ publish on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the update artifacts + latest.json so installed apps trust them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Croc Desktop __VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
