name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v0.1.0 — must match the version in package.json
  workflow_dispatch: {} # manual runs build + upload artifacts, but do NOT publish

permissions:
  contents: write # needed to create/upload the draft GitHub Release

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # One job per OS; each builds every arch its electron-builder target
          # lists. The macOS (Apple-Silicon) runner cross-builds x64 too —
          # electron-builder rebuilds node-pty per-arch — so no Intel runner is
          # needed.
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-builder only packages what already exists; build the renderer
      # (dist/) and Electron main (dist-electron/main.js) first.
      - name: Build renderer + main
        run: npm run typecheck && npx vite build

      # On a tag push: publish to the draft GitHub Release.
      # On a tag push, --publish always uploads the installers straight to the
      # GitHub Release. On manual dispatch, --publish never builds only (a
      # green run confirms packaging works, e.g. after a config change).
      - name: Build & package
        run: >-
          npx electron-builder
          --config electron-builder.json5
          --${{ matrix.platform }}
          ${{ github.event_name == 'push' && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds: don't let electron-builder try to auto-discover a
          # signing identity (would fail on the macOS runners).
          CSC_IDENTITY_AUTO_DISCOVERY: false
