name: CI

on:
  push:
    branches: [main, tauri-rewrite]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + frontend + Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # System libraries Tauri's Rust crates link against on Linux.
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:vite

      # cargo check triggers Tauri's externalBin validation, which needs the croc
      # sidecar present. (tauri-action does this via beforeBuildCommand; here we run
      # it explicitly.) Cache the download so it isn't re-fetched every run.
      - name: Cache croc sidecar
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries
          key: croc-${{ runner.os }}-${{ hashFiles('scripts/fetch-croc.mjs') }}

      - name: Fetch croc sidecar
        run: node scripts/fetch-croc.mjs

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml
