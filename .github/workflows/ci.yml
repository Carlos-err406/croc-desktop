name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall rebuilds the native node-pty against Electron and re-asserts
      # +x on its spawn-helper, so this also validates the native install path.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Builds both the renderer (dist/) and the Electron main (dist-electron/).
      # Packaging (electron-builder) is exercised by the release workflow.
      - name: Build renderer + main
        run: npx vite build
